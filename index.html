<!DOCTYPE html>
<html>
<head>
<title>Aviator Style Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 10px;
}

canvas {
  width: 100%;
  background: black;
  border-radius: 10px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

#start { background: green; }
#cash { background: orange; }

</style>
</head>

<body>

<div class="container">

<h2>✈️ Aviator Game</h2>

<input id="bet" placeholder="Enter Bet">

<canvas id="graph" height="250"></canvas>

<h1 id="multi">1.00x</h1>

<button id="start" onclick="startGame()">Bet</button>
<button id="cash" onclick="cashOut()">Cash Out</button>

<h3 id="result"></h3>

</div>

<audio id="flySound" src="https://www.soundjay.com/transportation/airplane-takeoff-01.mp3"></audio>
<audio id="crashSound" src="https://www.soundjay.com/explosion/explosion-01.wav"></audio>

<script>
let canvas = document.getElementById("graph");
let ctx = canvas.getContext("2d");

let x,y,multiplier,running,interval,bet;

function startGame(){
  bet=parseInt(document.getElementById("bet").value);
  if(running || bet<=0) return;

  document.getElementById("flySound").play();

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();

  x=0;
  y=canvas.height;
  multiplier=1;
  running=true;

  interval=setInterval(()=>{
    x+=3;
    y-=Math.random()*2;
    multiplier+=0.03;

    document.getElementById("multi").innerText=multiplier.toFixed(2)+"x";

    ctx.lineTo(x,y);
    ctx.strokeStyle="red";
    ctx.lineWidth=2;
    ctx.stroke();

    ctx.fillStyle="yellow";
    ctx.fillText("✈️",x,y);

    if(Math.random()<0.02){
      crash();
    }

  },50);
}

function crash(){
  clearInterval(interval);
  running=false;
  document.getElementById("crashSound").play();
  document.getElementById("result").innerText="💥 Crashed!";
}

function cashOut(){
  if(!running) return;

  clearInterval(interval);
  running=false;

  let win=Math.floor(bet*multiplier);

  document.getElementById("result").innerText="Won: "+win;
}
</script>

</body>
</html>
